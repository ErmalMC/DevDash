# Application Name
spring.application.name=backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/repairmatch
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson Timezone (for Skopje)
spring.jackson.time-zone=Europe/Skopje

# JWT Configuration
jwt.secret=RepairMatch2024SecretKeyMinimum256BitsForHS256Algorithm
jwt.expiration=86400000

# Server Port
server.port=8080

# Logging
logging.level.com.repairmatch=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.security=DEBUG