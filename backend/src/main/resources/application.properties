# Application Name
spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/devdash
spring.datasource.username=devdash_user
spring.datasource.password=stance22

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson Timezone (for Skopje)
spring.jackson.time-zone=Europe/Skopje

# JWT Configuration
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437772134743777217A25432A462D4A614E645267556B58703273357638792F413F44
jwt.expiration=86400000

# Server Port
server.port=8080

# Logging
logging.level.com.repairmatch=INFO
