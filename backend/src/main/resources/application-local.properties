# Local profile: run app against local PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devdash}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:devdash_user}
spring.datasource.password=${DB_PASSWORD:devdash_pass}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Seed test/demo data only for local development
app.seed.enabled=true

